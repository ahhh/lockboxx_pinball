<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LOCKBOXX Pinball — Level 1: The Vault</title>
<style>
  html,body{margin:0;padding:0;background:#07080d;height:100%;overflow:hidden;font-family:"Courier New",monospace}
  canvas{display:block;margin:0 auto;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="pinball.js"></script>
<script>
"use strict";
/* ============================================================
   LEVEL 1 — THE VAULT
   3 lock triggers slide 3 security gates open; the 3 vault doors
   behind them each extend a bridge segment; the finished bridge
   opens the vault core portal to Level 2. Captive-ball padlock:
   3 hits = jackpots + MULTIBALL. Extra bumper on the right.
   ============================================================ */
const {V, seg, colors} = PB;
const {GOLD, GOLD_D, CYAN} = colors;
const cx = PB.ctx;

/* ---------- level state ---------- */
const L = {
  triggersHit:[false,false,false],
  doorsHit:[false,false,false],
  bridgeT:[0,0,0],
  bridgeDone:false, finalOpenT:0, portalActive:false,
  padlockHits:0, padlockCd:0, padlockOpenT:0, captiveGone:false,
};
let captive = PB.makeBall(74,454,"captive");

/* ---------- shell + bumpers (all green, all the same small size) ---------- */
PB.standardShell({slings:false});
const GRN="#3aff8a";
PB.addBumper( 95,225,18,{col:GRN});
PB.addBumper(160,155,18,{col:GRN});
PB.addBumper(110,105,18,{col:GRN});
PB.addBumper(225, 85,18,{col:GRN});
PB.addBumper(386,368,18,{col:GRN});     // extra right-side bumper (design doc)
PB.addBumper(120,628,18,{col:GRN});     // circle bumpers replace the triangle slingshots
PB.addBumper(340,628,18,{col:GRN});     // (kept clear of the funnel so balls can't juggle-lock)

/* ---------- THE VAULT ---------- */
seg(140,252, 240,226, {e:0.35, nodraw:true});   // pitched roof
seg(240,226, 340,252, {e:0.35, nodraw:true});
seg(140,252, 140,340, {e:0.35, nodraw:true});
seg(340,252, 340,340, {e:0.35, nodraw:true});
seg(140,340, 152,340, {nodraw:true}); seg(188,340, 222,340, {nodraw:true});
seg(258,340, 292,340, {nodraw:true}); seg(328,340, 340,340, {nodraw:true});
const doors=[];
function makeSlot(xl,xr,topY,idx){
  seg(xl,340, xl,topY, {nodraw:true});
  seg(xr,340, xr,topY, {nodraw:true});
  const d = seg(xl,topY+2, xr,topY+2, {e:0.25, nodraw:true,
    enabled: ()=>L.finalOpenT<=0.5,   // every door slides away once the bridge is complete
    onHit:(s,b)=>hitDoor(idx,b.x,b.y)});
  doors.push(d);
}
makeSlot(152,188,272,0);
makeSlot(222,258,276,1);
makeSlot(292,328,272,2);
seg(222,252, 258,252, {nodraw:true});
/* all three tunnels become escape portals once the bridge is built */
const PORTALS=[
  {x:170,y:264,xl:152,xr:188,ty:272},
  {x:240,y:264,xl:222,xr:258,ty:276},
  {x:310,y:264,xl:292,xr:328,ty:272},
];

/* sliding security gates over the slot mouths */
const gates=[
  {x1:152,x2:188,y:341,t:0,open:false,dir:-1},
  {x1:222,x2:258,y:341,t:0,open:false,dir: 1},
  {x1:292,x2:328,y:341,t:0,open:false,dir: 1},
];
for(const g of gates){
  const s = seg(g.x1,g.y,g.x2,g.y,{e:0.4, nodraw:true, enabled:()=>g.t<=0.55,
    dynamic:(s)=>{
      const w=(g.x2-g.x1)*(1-g.t);
      const x1=g.dir<0?g.x1:g.x2-w;
      s.a.x=x1; s.b.x=x1+w;
    }});
}

/* ---------- lock triggers + wall targets ---------- */
const triggers=[];
function makeTrigger(x1,y1,x2,y2,i){
  triggers.push(PB.addTarget(x1,y1,x2,y2,{score:5000, color:GOLD, icon:"lock", once:true,
    vanish:true,      // unlocked locks disappear from the table entirely
    onHit:()=>hitTrigger(i)}));
}
makeTrigger( 60,540,  90,568, 0);       // lower pair shifted in toward the middle
makeTrigger(322,148, 358,168, 1);
makeTrigger(372,554, 400,526, 2);
PB.addTarget( 20,258,  20,298, {score:3000, label:"3K"});
PB.addTarget(428,428, 428,468, {score:3000, label:"3K"});
PB.addTarget(136,278, 136,318, {score:3000, label:"3K"});
PB.addTarget(344,278, 344,318, {score:3000, label:"3K"});

/* ---------- captive-ball padlock ---------- */
seg(44,374, 72,365, {nodraw:true});
seg(72,365, 104,374, {nodraw:true});
seg(44,374, 44,464,  {nodraw:true});
seg(104,374, 104,464,{nodraw:true});
seg(44,465, 104,465, {only:"captive", e:0.3, hidden:true});

/* ---------- side rail ---------- */
const RAIL = PB.addRail({
  pts:[V(26,512),V(4,446),V(0,300),V(4,120),V(40,48),V(112,40),V(130,62)],
  capture:{x:26,y:512,r:16},
  exit:{vx:130,vy:80},
  score:2500, msg:["RAIL RIDE!","+2,500"],
});

/* ---------- rules ---------- */
const LOCK_NAMES=["LEFT","CENTER","RIGHT"];
function hitTrigger(i){
  if(L.triggersHit[i]) return;
  L.triggersHit[i]=true;
  gates[i].open=true;
  PB.sfx.unlock();
  PB.game.shake=Math.max(PB.game.shake,5);
  PB.showMsg("LOCK OPEN!", LOCK_NAMES[i]+" SECURITY GATE SLIDING AWAY",2.4);
}
function hitDoor(i,bx,by){
  if(L.doorsHit[i] || !gates[i].open) return;
  L.doorsHit[i]=true;
  PB.addScore(25000);
  PB.sfx.thud();
  PB.game.shake=Math.max(PB.game.shake,9);
  PB.burst(bx,by,CYAN,22,360);
  const n=L.doorsHit.filter(Boolean).length;
  if(n<3) PB.showMsg("VAULT DOOR BREACHED!","BRIDGE SEGMENT "+n+" OF 3 EXTENDING",2.6);
  else {
    L.bridgeDone=true; L.portalActive=true;
    PB.addScore(50000);
    PB.showMsg("BRIDGE COMPLETE!","SHOOT ANY GLOWING TUNNEL TO ESCAPE!",3.2);
    PB.sfx.jackpot();
  }
}
function hitPadlock(impact){
  if(L.captiveGone || L.padlockCd>0 || impact<140) return;
  L.padlockCd=0.6;
  L.padlockHits++;
  PB.game.shake=Math.max(PB.game.shake,6);
  PB.burst(74,410,GOLD,12);
  if(L.padlockHits===1){ PB.addScore(50000); PB.sfx.chain(); PB.showMsg("JACKPOT! 50,000","CHAINS LOOSENING  1/3",2.2); }
  else if(L.padlockHits===2){ PB.addScore(75000); PB.sfx.chain(); PB.showMsg("JACKPOT! 75,000","CHAINS LOOSENING  2/3",2.2); }
  else {
    PB.addScore(100000);
    L.captiveGone=true;
    PB.addBall(captive.x, captive.y, (Math.random()-0.5)*80, 80);  // freed captive = MULTIBALL
    PB.burst(74,417,"#ffffff",30,420);
    PB.sfx.fanfare();
    PB.game.shake=10;
    PB.showMsg("PADLOCK DESTROYED!","MULTIBALL — TWO BALLS IN PLAY",3);
  }
}

/* ---------- engine hooks ---------- */
PB.init({
  level:1, music:"music/level1.mp3", name:"THE VAULT", next:"level2.html", slides:"level1_slides",
  letters:[[55,180],[250,55],[420,180],[60,300],[420,320],[160,470],[320,470],[240,650]],
  intro:["LEVEL 1: THE VAULT","HIT THE 3 GOLD LOCKS"],
  reset(){
    L.triggersHit=[false,false,false];
    L.doorsHit=[false,false,false];
    L.bridgeT=[0,0,0];
    L.bridgeDone=false; L.finalOpenT=0; L.portalActive=false;
    L.padlockHits=0; L.padlockCd=0; L.padlockOpenT=0; L.captiveGone=false;
    gates.forEach(g=>{g.t=0; g.open=false;});
    for(const tr of triggers){ tr.done=false; }
    captive = PB.makeBall(74,454,"captive");
  },
  tick(dt){
    if(L.padlockCd>0) L.padlockCd-=dt;
    if(!L.captiveGone){
      PB.stepBall(captive, dt);
      captive.vx *= (1-1.5*dt);           // extra damping so it settles in the chamber
      captive.x=Math.max(53,Math.min(95,captive.x));
      captive.y=Math.max(379,Math.min(456,captive.y));
    }
  },
  ballStep(b){
    if(!L.captiveGone) PB.collideBalls(b, captive, hitPadlock);
    if(L.portalActive && L.finalOpenT>0.5){
      for(const p of PORTALS){
        if(b.x>p.xl && b.x<p.xr && b.y<p.ty && b.y>246){
          PB.addScore(250000);
          PB.burst(p.x,p.y+40,CYAN,40,420);
          PB.levelComplete();
          return "remove";
        }
      }
    }
  },
  update(dt){
    for(const g of gates) if(g.open && g.t<1) g.t=Math.min(1,g.t+dt*1.6);
    for(let i=0;i<3;i++)
      if(L.doorsHit[i] && L.bridgeT[i]<1){
        L.bridgeT[i]=Math.min(1,L.bridgeT[i]+dt*0.9);
        if(L.bridgeT[i]===1) PB.sfx.clank();
      }
    if(L.bridgeDone && L.finalOpenT<1) L.finalOpenT=Math.min(1,L.finalOpenT+dt*1.2);
    if(L.captiveGone && L.padlockOpenT<1) L.padlockOpenT=Math.min(1,L.padlockOpenT+dt*2);
  },
  drawUnder(t){
    /* chasm + towers + bridge */
    cx.fillStyle="#05060a"; cx.fillRect(150,168,180,52);
    cx.strokeStyle="rgba(125,232,255,0.15)"; cx.lineWidth=1; cx.strokeRect(150,168,180,52);
    for(const tx of [128,332]){
      const g=cx.createLinearGradient(tx,0,tx+20,0);
      g.addColorStop(0,"#5a6480"); g.addColorStop(1,"#242a3c");
      cx.fillStyle=g; cx.fillRect(tx,162,20,86);
      cx.fillStyle="#1a1f2e"; cx.fillRect(tx-3,158,26,8);
    }
    for(let i=0;i<3;i++){
      const bt=L.bridgeT[i];
      if(bt<=0) continue;
      const x0=150+i*60, w=60*bt;
      const g=cx.createLinearGradient(0,180,0,208);
      g.addColorStop(0,"#c8a04a"); g.addColorStop(0.5,"#8a6a2a"); g.addColorStop(1,"#5c4718");
      cx.fillStyle=g; cx.fillRect(x0,180,w,26);
      cx.strokeStyle="#3c2f10"; cx.lineWidth=2;
      for(let px=x0+8;px<x0+w-4;px+=14){ cx.beginPath(); cx.moveTo(px,182); cx.lineTo(px,204); cx.stroke(); }
      if(bt<1){ cx.fillStyle="rgba(255,210,74,0.8)"; cx.fillRect(x0+w-3,178,3,30); }
    }
    if(L.bridgeDone){
      cx.fillStyle=`rgba(125,232,255,${0.25+0.15*Math.sin(t*6)})`;
      cx.fillRect(150,176,180,4);
    }
    /* vault body + gabled roof */
    const vg=cx.createLinearGradient(0,250,0,340);
    vg.addColorStop(0,"#39415a"); vg.addColorStop(1,"#232a3e");
    cx.fillStyle=vg; cx.fillRect(140,250,200,90);
    cx.strokeStyle="#59637f"; cx.lineWidth=2; cx.strokeRect(141,251,198,88);
    const rg=cx.createLinearGradient(0,226,0,252);
    rg.addColorStop(0,"#4a546e"); rg.addColorStop(1,"#2c3448");
    cx.fillStyle=rg;
    cx.beginPath(); cx.moveTo(140,252); cx.lineTo(240,226); cx.lineTo(340,252); cx.closePath(); cx.fill();
    cx.strokeStyle="#59637f"; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(140,252); cx.lineTo(240,226); cx.lineTo(340,252); cx.stroke();
    cx.fillStyle="rgba(255,255,255,0.06)";
    for(let x=150;x<340;x+=24){ cx.beginPath(); cx.arc(x,258,2,0,7); cx.fill(); cx.beginPath(); cx.arc(x,332,2,0,7); cx.fill(); }
    cx.fillStyle="#9aa4c0"; cx.font="bold 13px Courier New"; cx.textAlign="center";
    cx.fillText("T H E   V A U L T", 240, 247);
    /* slots, doors, gates */
    const slotDef=[[152,188,272],[222,258,276],[292,328,272]];
    for(let i=0;i<3;i++){
      const [xl,xr,ty]=slotDef[i];
      cx.fillStyle="#0a0d16"; cx.fillRect(xl,ty,xr-xl,340-ty);
      const midx=(xl+xr)/2;
      if(i===1){ cx.fillStyle="#05060a"; cx.fillRect(222,252,36,24); }
      if(L.portalActive){
        cx.fillStyle="#05060a"; cx.fillRect(xl,252,xr-xl,ty-250);
        const pg=cx.createRadialGradient(midx,264,2,midx,264,24);
        pg.addColorStop(0,"#ffffff"); pg.addColorStop(0.4,CYAN); pg.addColorStop(1,"rgba(125,232,255,0)");
        cx.fillStyle=pg;
        cx.globalAlpha=0.7+0.3*Math.sin(t*8);
        cx.beginPath(); cx.arc(midx,264,24,0,7); cx.fill();
        cx.globalAlpha=1;
      }
      const doorSlid=L.finalOpenT;   // all three doors slide open when the bridge is done
      if(doorSlid<1){
        const dw=(xr-xl)*(1-doorSlid);
        const hd=L.doorsHit[i];
        const dg=cx.createLinearGradient(0,ty-6,0,ty+6);
        if(hd){ dg.addColorStop(0,"#2c3448"); dg.addColorStop(1,"#161b28"); }
        else { dg.addColorStop(0,"#e05a6a"); dg.addColorStop(1,"#7a1f2e"); }
        cx.fillStyle=dg; cx.fillRect(xl, ty-6, dw, 12);
        if(!hd && gates[i].open){
          cx.fillStyle=`rgba(255,210,74,${0.5+0.4*Math.sin(t*7)})`;
          cx.fillRect(xl,ty-8,xr-xl,2); cx.fillRect(xl,ty+6,xr-xl,2);
        }
        if(!hd){
          cx.fillStyle="#3a0d14";
          cx.beginPath(); cx.arc((xl+xr)/2,ty-1,2.6,0,7); cx.fill();
          cx.fillRect((xl+xr)/2-1,ty-1,2,5);
        }
      }
      const g=gates[i];
      if(g.t<1){
        const w=(g.x2-g.x1)*(1-g.t);
        const x1=g.dir<0?g.x1:g.x2-w;
        const gg=cx.createLinearGradient(0,g.y-5,0,g.y+5);
        gg.addColorStop(0,"#8f99b5"); gg.addColorStop(0.5,"#525c78"); gg.addColorStop(1,"#333b52");
        cx.fillStyle=gg; cx.fillRect(x1,g.y-5,w,10);
        cx.strokeStyle="#1c2233"; cx.lineWidth=1; cx.strokeRect(x1,g.y-5,w,10);
        if(!g.open && w>20) PB.padlockIcon(x1+w/2, g.y+1, 9, false, L.triggersHit[i]?"#7dffa0":GOLD);
      }
      if(g.open && !L.doorsHit[i]){
        const yy=356+4*Math.sin(t*5+i);
        cx.fillStyle=`rgba(255,210,74,${0.5+0.3*Math.sin(t*5)})`;
        cx.beginPath();
        cx.moveTo((xl+xr)/2, yy); cx.lineTo((xl+xr)/2-7, yy+11); cx.lineTo((xl+xr)/2+7, yy+11);
        cx.closePath(); cx.fill();
      }
    }
    /* captive padlock (permanent structure) */
    {
      const pot=L.padlockOpenT;
      cx.strokeStyle="#b8c2d8"; cx.lineWidth=9;
      cx.beginPath();
      cx.arc(74-pot*14, 372, 22, Math.PI, Math.PI*(2-(L.captiveGone?0.25:0)));
      cx.stroke();
      const pg=cx.createLinearGradient(38,370,110,370);
      pg.addColorStop(0,"#e8b83a"); pg.addColorStop(0.5,"#c8992a"); pg.addColorStop(1,"#8a6a14");
      cx.fillStyle=pg;
      PB.roundRect(38,368,72,102,10); cx.fill();
      cx.strokeStyle="#6a5210"; cx.lineWidth=2; PB.roundRect(38,368,72,102,10); cx.stroke();
      cx.fillStyle="#12141d"; PB.roundRect(48,376,52,84,6); cx.fill();
      cx.strokeStyle="#c8ccd8"; cx.lineWidth=3;
      for(let i=L.padlockHits;i<3;i++){
        const yy=432+i*11;
        cx.beginPath();
        for(let lx=46;lx<=102;lx+=8){ cx.moveTo(lx,yy); cx.arc(lx+4,yy,3.5,0,7); }
        cx.stroke();
      }
      cx.fillStyle=L.captiveGone?"#7dffa0":GOLD_D; cx.font="bold 9px Courier New"; cx.textAlign="center";
      cx.fillText(L.captiveGone?"OPEN!":"CAPTIVE", 74, 482);
      if(!L.captiveGone) PB.drawBall(captive,"#d8dce8");
    }
  },
  drawHUD(t){
    for(let i=0;i<3;i++)
      PB.padlockIcon(258+i*18, 18, 7, L.triggersHit[i], L.triggersHit[i]?"#7dffa0":"#5a6480");
    for(let i=0;i<3;i++){
      cx.fillStyle=L.doorsHit[i]?CYAN:"#333b52";
      cx.fillRect(318+i*13, 10, 8, 15);
    }
  },
  wonStats(){
    return [
      "Locks opened: "+L.triggersHit.filter(Boolean).length+"/3",
      "Vault doors breached: "+L.doorsHit.filter(Boolean).length+"/3",
      "Padlock "+(L.captiveGone?"destroyed (multiball!)":"hits: "+L.padlockHits+"/3"),
      "NEXT STOP: LEVEL 2 — THE SUBWAY",
    ];
  },
});
</script>
</body>
</html>
