<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LOCKBOXX Pinball — Level 2: The Subway</title>
<style>
  html,body{margin:0;padding:0;background:#07080d;height:100%;overflow:hidden;font-family:"Courier New",monospace}
  canvas{display:block;margin:0 auto;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="pinball.js"></script>
<script>
"use strict";
/* ============================================================
   LEVEL 2 — THE SUBWAY
   Two decks. Ball starts on the upper deck (mini flippers over a
   center gap). Three subway tubes loop the ball between decks —
   visit all 3 stations to unlock the GOLDEN TUBE to Level 3.
   A train crosses under the deck gap: time your drop to board it.
   Lock 3 balls in the subway cars for RUSH HOUR MULTIBALL.
   The turnstile spinner raises the fare multiplier.
   ============================================================ */
const {V, seg, colors} = PB;
const {GOLD, CYAN, GREEN, PURPLE} = colors;
const cx = PB.ctx;

const L = {
  stations:[false,false,false],
  combo:0, comboT:0,
  locks:0, rushDone:false,
  spinAng:0, spinVel:0, spinCd:0,
  tT:0,               // train clock
  goldRidden:false,
};
const TRAIN_PERIOD=9, TRAIN_SPEED=150, TRAIN_W=90;
function trainX(){ const p=L.tT%TRAIN_PERIOD; return p<4 ? -110+TRAIN_SPEED*p : -999; }
function trainOn(){ return trainX()>-200; }

/* ---------- shell ---------- */
PB.standardShell();

/* ---------- upper deck ---------- */
seg(16,410, 206,452);                    // upper floor clears ABOVE the pivot caps, feeding the center gap
seg(432,410, 274,452);
PB.addFlipper(196,464,-1,30);            // mini flippers over the gap (short: the gap must be droppable)
PB.addFlipper(284,464, 1,30);
PB.addBumper(150,120,18);
PB.addBumper(330,120,18);
PB.addBumper(140,560,18);                // lower deck bumper
PB.addTarget( 20,258,  20,298, {score:3000, label:"3K"});
PB.addTarget(428,300, 428,340, {score:3000, label:"3K"});

/* ---------- tubes (stations) ---------- */
const STATION_NAMES=["ASHFORD","BRASSGATE","CINDER ROW"];
function station(i){
  PB.sfx.horn();
  if(L.comboT>0){ L.combo++; PB.addScore(5000*L.combo); PB.showMsg("STATION COMBO x"+L.combo,"+"+(5000*L.combo).toLocaleString(),1.8); }
  else L.combo=1;
  L.comboT=8;
  if(!L.stations[i]){
    L.stations[i]=true;
    const n=L.stations.filter(Boolean).length;
    PB.showMsg("STATION: "+STATION_NAMES[i], n<3 ? n+"/3 STATIONS VISITED" : "GOLDEN TUBE UNLOCKED!", 2.2);
    if(n===3) PB.sfx.fanfare();
  }
}
const TUBE_A = PB.addRail({
  pts:[V(50,330),V(20,260),V(30,140),V(90,70),V(180,60)],
  capture:{x:50,y:330,r:15}, exit:{vx:120,vy:60},
  score:2500, color:"61,213,121", onRide:()=>station(0),
});
const TUBE_B = PB.addRail({
  pts:[V(410,330),V(442,390),V(446,500),V(430,580),V(370,640)],
  capture:{x:410,y:330,r:15}, exit:{vx:-60,vy:100},
  score:2500, color:"125,232,255", onRide:()=>station(1),
});
const TUBE_C = PB.addRail({
  pts:[V(70,560),V(28,500),V(12,400),V(22,300),V(60,240),V(110,215)],
  capture:{x:70,y:560,r:15}, exit:{vx:110,vy:40},
  score:2500, color:"255,210,74", onRide:()=>station(2),
});
const GOLD_TUBE = PB.addRail({
  pts:[V(240,600),V(310,570),V(380,520),V(430,440),V(456,330),V(440,220),V(380,150),V(300,115),V(240,110)],
  capture:{x:240,y:600,r:16},
  enabled:()=>L.stations.every(Boolean) && !L.goldRidden,
  score:50000, color:"255,210,74", width:26,
  msg:["GOLDEN TUBE!","NEXT STOP: LEVEL 3"],
  onRide:()=>{ L.goldRidden=true; },
  onExit:(b)=>{ PB.levelComplete(); PB.removeBall(b); },
});
/* train ride: capture mouth follows the train under the deck gap */
const TRAIN_RAIL = PB.addRail({
  pts:[V(240,478),V(340,482),V(420,520),V(400,580)],
  capture:{x:-999,y:478,r:26},
  exit:{vx:-40,vy:100},
  speed:300, visible:false,
  score:15000, msg:["CAUGHT THE TRAIN!","+15,000"],
});

/* ---------- ball locks (subway cars, lower right) ---------- */
const LOCK={x:390,y:600,r:14};

/* ---------- spinner (fare turnstile, upper deck) ---------- */
const SPIN={x:240,y:180};

PB.init({
  level:2, music:"music/level2.mp3", name:"THE SUBWAY", next:"level3.html", slides:"level2_slides",
  letters:[[60,120],[240,80],[420,120],[100,250],[380,250],[240,545],[75,650],[395,635]],
  bg:["#101a22","#0c141c","#080d12"],
  intro:["LEVEL 2: THE SUBWAY","VISIT ALL 3 STATIONS BY TUBE"],
  reset(){
    L.stations=[false,false,false];
    L.combo=0; L.comboT=0;
    L.locks=0; L.rushDone=false;
    L.spinAng=0; L.spinVel=0; L.spinCd=0;
    L.tT=0; L.goldRidden=false;
  },
  tick(dt){
    L.tT += dt;
    TRAIN_RAIL.capture.x = trainOn() ? trainX()+TRAIN_W/2 : -999;
    if(L.comboT>0) L.comboT-=dt; else L.combo=0;
    if(L.spinCd>0) L.spinCd-=dt;
    L.spinAng += L.spinVel*dt;
    L.spinVel *= (1-3*dt);
  },
  ballStep(b){
    /* turnstile spinner: pass through to spin up the fare multiplier */
    if(L.spinCd<=0 && Math.hypot(b.x-SPIN.x,b.y-SPIN.y)<26 && Math.hypot(b.vx,b.vy)>140){
      L.spinCd=0.8;
      L.spinVel += 14;
      PB.game.mult = Math.min(5, PB.game.mult+0.5);
      PB.addScore(1000);
      PB.sfx.target();
      PB.showMsg("FARE x"+PB.game.mult.toFixed(1),"TURNSTILE SPINNING",1.4);
    }
    /* subway car ball lock */
    if(!L.rushDone && L.locks<3 && Math.hypot(b.x-LOCK.x,b.y-LOCK.y)<LOCK.r+9){
      L.locks++;
      PB.burst(LOCK.x,LOCK.y,CYAN,14);
      if(L.locks<3){
        PB.showMsg("BALL LOCKED","SUBWAY CAR "+L.locks+"/3 FULL",2);
        PB.sfx.thud();
        if(PB.balls.length<=1) PB.serve();
      } else {
        L.rushDone=true;
        PB.showMsg("RUSH HOUR MULTIBALL!","3 TRAINS FULL — ALL ABOARD",3);
        PB.sfx.fanfare();
        PB.game.shake=10;
        PB.addScore(50000);
        PB.addBall(360,560,-120,-80);
        PB.addBall(390,540,-60,-120);
        PB.addBall(420,560,-160,-40);
      }
      return "remove";
    }
  },
  drawUnder(t){
    /* tunnel band between decks + track */
    cx.fillStyle="#05070c";
    cx.fillRect(16,470,448,36);
    cx.strokeStyle="#2a3348"; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(16,500); cx.lineTo(464,500); cx.stroke();
    cx.setLineDash([8,10]);
    cx.strokeStyle="#3a4258";
    cx.beginPath(); cx.moveTo(16,486); cx.lineTo(464,486); cx.stroke();
    cx.setLineDash([]);
    /* train */
    const tx=trainX();
    if(tx>-200){
      const g=cx.createLinearGradient(0,474,0,502);
      g.addColorStop(0,"#4a5878"); g.addColorStop(1,"#232a3e");
      cx.fillStyle=g;
      PB.roundRect(tx,474,TRAIN_W,28,5); cx.fill();
      cx.fillStyle=GOLD;
      for(let w=0;w<4;w++) cx.fillRect(tx+10+w*20,480,12,9);
      cx.fillStyle="#e05a6a"; cx.fillRect(tx+TRAIN_W-4,478,4,20);
      cx.strokeStyle="#1c2233"; cx.lineWidth=1.5;
      PB.roundRect(tx,474,TRAIN_W,28,5); cx.stroke();
    }
    /* upper-deck station canopy */
    cx.fillStyle="rgba(125,232,255,0.06)";
    cx.fillRect(60,54,360,14);
    cx.fillStyle="#59637f"; cx.font="bold 11px Courier New"; cx.textAlign="center";
    cx.fillText("U P T O W N   P L A T F O R M", 240, 65);
    cx.fillStyle="#3a4258"; cx.font="9px Courier New";
    cx.fillText("LOWER DECK", 240, 528);
    /* spinner turnstile */
    cx.save();
    cx.translate(SPIN.x,SPIN.y);
    cx.strokeStyle="#59637f"; cx.lineWidth=2;
    cx.beginPath(); cx.arc(0,0,27,0,7); cx.stroke();
    cx.rotate(L.spinAng);
    cx.strokeStyle=PB.game.mult>1?GOLD:"#8892b0"; cx.lineWidth=4; cx.lineCap="round";
    for(let a=0;a<4;a++){
      cx.beginPath(); cx.moveTo(0,0); cx.lineTo(24,0); cx.stroke();
      cx.rotate(Math.PI/2);
    }
    cx.restore();
    cx.fillStyle="#59637f"; cx.font="9px Courier New";
    cx.fillText("FARE", SPIN.x, SPIN.y+42);
    /* station name plates at tube mouths */
    const plates=[[50,306,"A"],[410,306,"B"],[70,536,"C"]];
    for(let i=0;i<3;i++){
      const [x,y,ch]=plates[i];
      cx.fillStyle=L.stations[i]?"#2ed579":"#333b52";
      PB.roundRect(x-10,y-9,20,18,4); cx.fill();
      cx.fillStyle="#0a1016"; cx.font="bold 11px Courier New";
      cx.fillText(ch,x,y+4);
    }
    /* subway car lock berths (lower right) */
    for(let i=0;i<3;i++){
      const y=560+i*26;
      const full=i<L.locks;
      cx.fillStyle=full?"#2a4a6e":"#161b28";
      PB.roundRect(408,y,48,20,4); cx.fill();
      cx.strokeStyle=full?CYAN:"#333b52"; cx.lineWidth=1.5;
      PB.roundRect(408,y,48,20,4); cx.stroke();
      if(full){
        cx.fillStyle=GOLD;
        cx.fillRect(414,y+5,8,6); cx.fillRect(428,y+5,8,6); cx.fillRect(442,y+5,8,6);
      }
    }
    if(!L.rushDone && L.locks<3){
      cx.fillStyle=`rgba(125,232,255,${0.35+0.3*Math.sin(t*5)})`;
      cx.beginPath(); cx.arc(LOCK.x,LOCK.y,LOCK.r,0,7); cx.fill();
      cx.fillStyle="#9aa4c0"; cx.font="8px Courier New";
      cx.fillText("LOCK",LOCK.x,LOCK.y-18);
    }
    /* golden tube gate sign */
    if(!L.stations.every(Boolean)){
      cx.fillStyle="rgba(255,210,74,0.35)";
      PB.padlockIcon(240,600,10,false,"rgba(255,210,74,0.5)");
    }
  },
  drawHUD(t){
    for(let i=0;i<3;i++){
      cx.fillStyle=L.stations[i]?"#2ed579":"#333b52";
      cx.beginPath(); cx.arc(262+i*16,17,6,0,7); cx.fill();
    }
    for(let i=0;i<3;i++){
      cx.fillStyle=i<L.locks?CYAN:"#333b52";
      cx.fillRect(318+i*13,10,9,14);
    }
  },
  wonStats(){
    return [
      "Stations visited: "+L.stations.filter(Boolean).length+"/3",
      "Balls locked: "+L.locks+"/3"+(L.rushDone?" (RUSH HOUR!)":""),
      "Best fare multiplier: x"+PB.game.mult.toFixed(1),
      "NEXT STOP: LEVEL 3 — HAUNTED CASTLE",
    ];
  },
});
</script>
</body>
</html>
